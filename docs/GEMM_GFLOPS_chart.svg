<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold">GEMM 各版本 GFLOPS 趋势 (n=1024)</text>
  
  <!-- 坐标轴 -->
  <line x1="80" y1="450" x2="750" y2="450" stroke="black" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="450" stroke="black" stroke-width="2"/>
  
  <!-- Y轴刻度和网格线 (0-500) -->
  <text x="65" y="455" text-anchor="middle" font-family="Arial" font-size="12">0</text>
  <line x1="80" y1="450" x2="750" y2="450" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="375" text-anchor="middle" font-family="Arial" font-size="12">100</text>
  <line x1="80" y1="370" x2="750" y2="370" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="295" text-anchor="middle" font-family="Arial" font-size="12">200</text>
  <line x1="80" y1="290" x2="750" y2="290" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="215" text-anchor="middle" font-family="Arial" font-size="12">300</text>
  <line x1="80" y1="210" x2="750" y2="210" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="135" text-anchor="middle" font-family="Arial" font-size="12">400</text>
  <line x1="80" y1="130" x2="750" y2="130" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="55" text-anchor="middle" font-family="Arial" font-size="12">500</text>
  <line x1="80" y1="50" x2="750" y2="50" stroke="#ddd" stroke-width="1"/>
  
  <!-- 折线 -->
  <polyline points="150,447.52 288,424.06 425,402.26 563,370.77 700,78.73" fill="none" stroke="#3498db" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 数据点和数值 -->
  <circle cx="150" cy="447.52" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="150" y="435" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">3.10</text>
  <text x="150" y="475" text-anchor="middle" font-family="Arial" font-size="11">Naive(ijk)</text>
  
  <circle cx="288" cy="424.06" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="288" y="412" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">32.42</text>
  <text x="288" y="475" text-anchor="middle" font-family="Arial" font-size="11">Naive(ikj)</text>
  
  <circle cx="425" cy="402.26" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="425" y="390" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">59.67</text>
  <text x="425" y="475" text-anchor="middle" font-family="Arial" font-size="11">OpenMP</text>
  
  <circle cx="563" cy="370.77" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="563" y="358" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">99.04</text>
  <text x="563" y="475" text-anchor="middle" font-family="Arial" font-size="11">Tiling</text>
  
  <circle cx="700" cy="78.73" r="6" fill="white" stroke="#e74c3c" stroke-width="3"/>
  <text x="700" y="66" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e74c3c">464.09</text>
  <text x="700" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">Naive_GPU</text>
  
  <!-- Y轴标题 -->
  <text x="25" y="250" text-anchor="middle" font-family="Arial" font-size="14" transform="rotate(-90, 25, 250)">GFLOPS</text>
</svg>
