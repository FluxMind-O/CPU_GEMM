<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold">GEMM 各版本 GFLOPS 趋势 (n=1024)</text>
  
  <!-- 坐标轴 -->
  <line x1="80" y1="450" x2="750" y2="450" stroke="black" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="450" stroke="black" stroke-width="2"/>
  
  <!-- Y轴刻度和网格线 (0-1000) -->
  <text x="65" y="455" text-anchor="middle" font-family="Arial" font-size="12">0</text>
  <line x1="80" y1="450" x2="750" y2="450" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="375" text-anchor="middle" font-family="Arial" font-size="12">200</text>
  <line x1="80" y1="370" x2="750" y2="370" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="295" text-anchor="middle" font-family="Arial" font-size="12">400</text>
  <line x1="80" y1="290" x2="750" y2="290" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="215" text-anchor="middle" font-family="Arial" font-size="12">600</text>
  <line x1="80" y1="210" x2="750" y2="210" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="135" text-anchor="middle" font-family="Arial" font-size="12">800</text>
  <line x1="80" y1="130" x2="750" y2="130" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="55" text-anchor="middle" font-family="Arial" font-size="12">1000</text>
  <line x1="80" y1="50" x2="750" y2="50" stroke="#ddd" stroke-width="1"/>
  
  <!-- 折线 -->
  <polyline points="150,448.76 288,437.03 425,426.13 563,410.38 700,141.39" fill="none" stroke="#3498db" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 数据点和数值 -->
  <circle cx="150" cy="448.76" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="150" y="436" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">3.10</text>
  <text x="150" y="475" text-anchor="middle" font-family="Arial" font-size="11">Naive(ijk)</text>
  
  <circle cx="288" cy="437.03" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="288" y="424" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">32.42</text>
  <text x="288" y="475" text-anchor="middle" font-family="Arial" font-size="11">Naive(ikj)</text>
  
  <circle cx="425" cy="426.13" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="425" y="413" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">59.67</text>
  <text x="425" y="475" text-anchor="middle" font-family="Arial" font-size="11">OpenMP</text>
  
  <circle cx="563" cy="410.38" r="6" fill="white" stroke="#3498db" stroke-width="3"/>
  <text x="563" y="398" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">99.04</text>
  <text x="563" y="475" text-anchor="middle" font-family="Arial" font-size="11">Tiling</text>
  
  <circle cx="700" cy="141.39" r="6" fill="white" stroke="#e74c3c" stroke-width="3"/>
  <text x="700" y="129" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e74c3c">771.52</text>
  <text x="700" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">Naive_GPU</text>
  
  <!-- Y轴标题 -->
  <text x="25" y="250" text-anchor="middle" font-family="Arial" font-size="14" transform="rotate(-90, 25, 250)">GFLOPS</text>
</svg>
